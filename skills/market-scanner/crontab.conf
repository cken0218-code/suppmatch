# Market Scanner Cron Configuration
# Daily scanning at 9:00 AM (market open time in Australia)

# Setup:
# 1. Run: crontab -e
# 2. Add the following line:
# 0 9 * * * cd /Users/cken0218/.openclaw/workspace/skills/market-scanner && python3 market_scanner.py --cron >> cron_log.txt 2>&1

# Alternative: Weekly scan (Sunday 9:00 AM)
# 0 9 * * 0 cd /Users/cken0218/.openclaw/workspace/skills/market-scanner && python3 market_scanner.py --cron >> cron_log.txt 2>&1

# Alternative: Every 6 hours
# 0 */6 * * * cd /Users/cken0218/.openclaw/workspace/skills/market-scanner && python3 market_scanner.py --cron >> cron_log.txt 2>&1

# Environment variables (add to crontab or .zshrc/.bashrc):
# export DISCORD_WEBHOOK_URL="your_webhook_url_here"

# Cron log location:
# /Users/cken0218/.openclaw/workspace/skills/market-scanner/cron_log.txt

# Check cron is running:
# crontab -l

# View logs:
# tail -f /Users/cken0218/.openclaw/workspace/skills/market-scanner/cron_log.txt

# Remove cron:
# crontab -r
