<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 OpenClaw Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #a371f7;
            --cyan: #39c5cf;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top, #1a1f2e 0%, transparent 50%),
                linear-gradient(180deg, #0d1117 0%, #0a0e14 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
        }
        
        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 18px;
            color: var(--purple);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .card-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: var(--cyan);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .agent {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .agent:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }
        
        .agent-icon {
            font-size: 24px;
            margin-right: 15px;
            width: 40px;
            text-align: center;
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .agent-task {
            font-size: 16px;
            color: #8b949e;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
        }
        
        .status-idle { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
        .status-active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
        .status-busy { background: var(--red); box-shadow: 0 0 8px var(--red); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .health-bar {
            margin-bottom: 15px;
        }
        
        .health-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 18px;
        }
        
        .health-track {
            height: 20px;
            background: var(--bg-dark);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .health-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .health-cpu { background: linear-gradient(90deg, var(--green), var(--cyan)); }
        .health-mem { background: linear-gradient(90deg, var(--purple), var(--accent)); }
        
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--accent);
            font-size: 16px;
        }
        
        .activity-time {
            color: #8b949e;
            font-size: 14px;
            margin-right: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 2px solid var(--green);
            border-radius: 8px;
            padding: 15px 20px;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 4.7s forwards;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #8b949e;
            font-size: 16px;
        }
        
        .pixel-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 15px 30px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .pixel-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OPENCLAW DASHBOARD</h1>
            <div class="subtitle">AI Agent Control Center v1.0</div>
        </header>
        
        <div class="grid">
            <!-- Agents Card -->
            <div class="card">
                <div class="card-title">👥 AGENTS</div>
                <div id="agents-list"></div>
            </div>
            
            <!-- System Health Card -->
            <div class="card">
                <div class="card-title">💓 SYSTEM</div>
                <div class="health-bar">
                    <div class="health-label">
                        <span>CPU</span>
                        <span id="cpu-value">0%</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill health-cpu" id="cpu-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="health-bar">
                    <div class="health-label">
                        <span>Memory</span>
                        <span id="mem-value">0%</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill health-mem" id="mem-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <div style="font-size: 14px; color: #8b949e;">Uptime</div>
                    <div id="uptime" style="font-size: 24px; color: var(--green);">0m</div>
                </div>
            </div>
            
            <!-- Activity Card -->
            <div class="card">
                <div class="card-title">📜 ACTIVITY</div>
                <div class="activity-list" id="activity-list"></div>
            </div>
        </div>
        
        <div class="footer">
            <button class="pixel-btn" onclick="refreshStatus()">🔄 REFRESH</button>
            <div style="10px;">
               margin-top:  Last updated: <span id="last-updated">--</span>
            </div>
        </div>
    </div>
    
    <div id="notifications"></div>
    
    <script>
        let lastNotificationCount = 0;
        
        async function refreshStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                // Update agents
                const agentsList = document.getElementById('agents-list');
                agentsList.innerHTML = data.agents.map(agent => `
                    <div class="agent">
                        <div class="agent-icon">🤖</div>
                        <div class="agent-info">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-task">${agent.task}</div>
                        </div>
                        <div class="status-dot status-${agent.status}"></div>
                    </div>
                `).join('');
                
                // Update health
                document.getElementById('cpu-value').textContent = data.system.cpu + '%';
                document.getElementById('cpu-bar').style.width = data.system.cpu + '%';
                document.getElementById('mem-value').textContent = data.system.memory + '%';
                document.getElementById('mem-bar').style.width = data.system.memory + '%';
                document.getElementById('uptime').textContent = data.system.uptime;
                
                // Update activity
                const activityList = document.getElementById('activity-list');
                activityList.innerHTML = data.activity.map(item => `
                    <div class="activity-item">
                        <span class="activity-time">${item.time}</span>
                        ${item.message}
                    </div>
                `).join('');
                
                // Check for new notifications
                if (data.notifications.length > lastNotificationCount && lastNotificationCount > 0) {
                    showNotification(data.notifications[0]);
                }
                lastNotificationCount = data.notifications.length;
                
                // Update last updated time
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }
        
        function showNotification(notif) {
            const container = document.getElementById('notifications');
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = `
                <div style="font-size: 18px; color: var(--green);">✅ ${notif.message}</div>
                <div style="font-size: 14px; color: #8b949e; margin-top: 5px;">${notif.time}</div>
            `;
            container.appendChild(div);
            
            setTimeout(() => {
                div.remove();
            }, 5000);
        }
        
        // Auto refresh every 5 seconds
        refreshStatus();
        setInterval(refreshStatus, 5000);
    </script>
</body>
</html>
