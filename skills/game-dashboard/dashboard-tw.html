<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 OpenClaw 控制台</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #a371f7;
            --cyan: #39c5cf;
        }
        
        body {
            font-family: 'Noto Sans TC', 'VT323', monospace;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top, #1a1f2e 0%, transparent 50%),
                linear-gradient(180deg, #0d1117 0%, #0a0e14 100%);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
        }
        
        h1 {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 18px;
            color: var(--purple);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        
        .card-title {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--cyan);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        
        .agent {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        
        .agent:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }
        
        .agent-icon {
            font-size: 28px;
            margin-right: 15px;
            width: 50px;
            text-align: center;
        }
        
        .agent-info {
            flex: 1;
        }
        
        .agent-name {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .agent-task {
            font-size: 16px;
            color: #8b949e;
        }
        
        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-left: 10px;
        }
        
        .status-idle { 
            background: var(--yellow); 
            box-shadow: 0 0 10px var(--yellow);
        }
        .status-active { 
            background: var(--green); 
            box-shadow: 0 0 10px var(--green);
            animation: pulse 1s infinite;
        }
        .status-busy { 
            background: var(--red); 
            box-shadow: 0 0 10px var(--red);
            animation: pulse 0.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        .health-bar {
            margin-bottom: 15px;
        }
        
        .health-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 16px;
        }
        
        .health-track {
            height: 24px;
            background: var(--bg-dark);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .health-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 12px;
            color: white;
            font-weight: bold;
        }
        
        .health-cpu { background: linear-gradient(90deg, #2ea043, #39c5cf); }
        .health-mem { background: linear-gradient(90deg, #8957e5, #58a6ff); }
        
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--accent);
            font-size: 15px;
        }
        
        .activity-time {
            color: #8b949e;
            font-size: 13px;
            margin-right: 10px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 2px solid var(--green);
            border-radius: 8px;
            padding: 15px 20px;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 4.7s forwards;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
            max-width: 300px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #8b949e;
            font-size: 14px;
        }
        
        .pixel-btn {
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 24px;
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }
        
        .pixel-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--accent);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .badge-idle { background: rgba(210, 153, 34, 0.2); color: var(--yellow); }
        .badge-active { background: rgba(63, 185, 80, 0.2); color: var(--green); }
        .badge-busy { background: rgba(248, 81, 73, 0.2); color: var(--red); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        
        .pulse-ring {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--green);
            animation: ring 2s infinite;
        }
        
        @keyframes ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OpenClaw 控制台</h1>
            <div class="subtitle">AI 代理控制中心 v1.0</div>
        </header>
        
        <div class="grid">
            <!-- 代理狀態 -->
            <div class="card">
                <div class="card-title">👥 代理列表</div>
                <div id="agents-list"></div>
            </div>
            
            <!-- 系統健康 -->
            <div class="card">
                <div class="card-title">💓 系統狀態</div>
                <div class="health-bar">
                    <div class="health-label">
                        <span>CPU 使用率</span>
                        <span id="cpu-value">0%</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill health-cpu" id="cpu-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="health-bar">
                    <div class="health-label">
                        <span>記憶體</span>
                        <span id="mem-value">0%</span>
                    </div>
                    <div class="health-track">
                        <div class="health-fill health-mem" id="mem-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <div style="font-size: 14px; color: #8b949e;">運行時間</div>
                    <div id="uptime" style="font-size: 28px; color: var(--green);">0 分鐘</div>
                </div>
            </div>
            
            <!-- 活動日誌 -->
            <div class="card">
                <div class="card-title">📜 活動日誌</div>
                <div class="activity-list" id="activity-list"></div>
            </div>
        </div>
        
        <div class="footer">
            <button class="pixel-btn" onclick="refreshStatus()">🔄 重新整理</button>
            <div style="margin-top: 15px;">
                最後更新：<span id="last-updated">--</span>
            </div>
        </div>
    </div>
    
    <div id="notifications"></div>
    
    <script>
        let lastNotificationCount = 0;
        let activityCount = 0;
        
        async function refreshStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                // 更新代理列表
                const agentsList = document.getElementById('agents-list');
                agentsList.innerHTML = data.agents.map(agent => `
                    <div class="agent">
                        <div class="agent-icon">
                            ${agent.status === 'active' ? '⚡' : agent.status === 'busy' ? '🔥' : '💤'}
                        </div>
                        <div class="agent-info">
                            <div class="agent-name">
                                ${agent.name}
                                <span class="status-badge badge-${agent.status}">
                                    ${agent.status === 'active' ? '工作中' : agent.status === 'busy' ? '忙碌中' : '待機中'}
                                </span>
                            </div>
                            <div class="agent-task">${agent.task}</div>
                        </div>
                        <div class="status-dot status-${agent.status}"></div>
                    </div>
                `).join('');
                
                // 更新系統健康
                document.getElementById('cpu-value').textContent = data.system.cpu + '%';
                document.getElementById('cpu-bar').style.width = Math.min(data.system.cpu, 100) + '%';
                document.getElementById('mem-value').textContent = data.system.memory + '%';
                document.getElementById('mem-bar').style.width = Math.min(data.system.memory, 100) + '%';
                document.getElementById('uptime').textContent = data.system.uptime;
                
                // 更新活動日誌
                const activityList = document.getElementById('activity-list');
                if (data.activity.length !== activityCount) {
                    activityCount = data.activity.length;
                    activityList.innerHTML = data.activity.map(item => `
                        <div class="activity-item">
                            <span class="activity-time">${item.time}</span>
                            ${item.message}
                        </div>
                    `).join('');
                }
                
                // 檢查新通知
                if (data.notifications.length > 0 && lastNotificationCount > 0) {
                    showNotification(data.notifications[0]);
                }
                lastNotificationCount = data.notifications.length;
                
                // 更新時間
                const now = new Date();
                document.getElementById('last-updated').textContent = 
                    now.toLocaleTimeString('zh-TW');
                
            } catch (error) {
                console.error('獲取狀態失敗:', error);
            }
        }
        
        function showNotification(notif) {
            const container = document.getElementById('notifications');
            const div = document.createElement('div');
            div.className = 'notification';
            div.innerHTML = `
                <div style="font-size: 16px; color: var(--green);">✅ ${notif.message}</div>
                <div style="font-size: 13px; color: #8b949e; margin-top: 5px;">${notif.time}</div>
            `;
            container.appendChild(div);
            
            setTimeout(() => {
                div.remove();
            }, 5000);
        }
        
        // 每 3 秒自動刷新（已經好接近即時！）
        refreshStatus();
        setInterval(refreshStatus, 3000);
    </script>
</body>
</html>
